<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Inventory</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<script>
if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
}
</script>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">

        <span class="navbar-brand">
            Inventory Gudang
        </span>

        <button class="btn btn-danger" onclick="logout()">
            Logout
        </button>

    </div>
</nav>

<div class="container mt-4">

    <div class="text-center mb-4">
        <h2>Dashboard Inventory Gudang</h2>
        <p>Selamat Datang di Sistem Inventory Gudang</p>
    </div>

    <div class="row g-3">

        <div class="col-md-4">
            <a href="suppliers.html" class="btn btn-primary w-100 p-3">
                Data Supplier
            </a>
        </div>

        <div class="col-md-4">
            <a href="products.html" class="btn btn-success w-100 p-3">
                Data Produk
            </a>
        </div>

        <div class="col-md-4">
            <a href="transactions.html" class="btn btn-warning w-100 p-3">
                Data Transaksi
            </a>
        </div>

    </div>

</div>

<script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}
</script>

</body>
</html>
